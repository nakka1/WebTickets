<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Agência de Viagens</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script type="module" src="../assets/js/main.js"></script>
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Alternar tema">
        <span class="icon-moon">🌙</span>
        <span class="icon-sun">☀️</span>
    </button>

    <header class="dashboard-header">
        <div class="header-brand">
            <h2>✈️ Web Passeios - Painel Admin</h2>
        </div>
        <nav class="header-nav">
            <button id="btn-logout-dashboard" class="form-btn" style="border: 1px solid #dc3545; color: #dc3545; padding: 5px 15px;">Sair do Painel</button>
        </nav>
    </header>

    <main class="dashboard-main">
        
        <section class="crud-form-section">
            <div class="form-container dashboard-box">
                <div class="form-header">
                    <p>Gerenciamento de Catálogo</p>
                    <h1>Cadastrar Destino</h1>
                </div>

                <form class="form-box" id="travel-form">
                    <div class="input-group">
                        <input type="text" id="destino" class="input-field" placeholder="" required />
                        <label for="destino" class="floating-label">Nome do Destino</label>
                    </div>

                    <div class="input-group">
                        <input type="number" id="preco" class="input-field" placeholder="" min="0" step="0.01" required />
                        <label for="preco" class="floating-label">Preço (R$)</label>
                    </div>

                    <div class="input-group">
                        <input type="url" id="imagem-url" class="input-field" placeholder="" required />
                        <label for="imagem-url" class="floating-label">URL da Imagem de Capa</label>
                    </div>

                    <div class="input-group">
                        <input type="text" id="descricao" class="input-field" placeholder="" required />
                        <label for="descricao" class="floating-label">Descrição Breve</label>
                    </div>

                    <button type="submit" class="form-btn form-btn--submit">
                        Salvar Pacote
                    </button>
                </form>
            </div>
        </section>

        <section class="crud-list-section">
            <h2 class="section-title">Pacotes Ativos no Banco</h2>
            
            <div class="cards-grid" id="admin-grid">
                </div>
        </section>

    </main>

</body>
</html>
