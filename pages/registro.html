<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Reserva de Viagens</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/main.js" defer></script>
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Alternar tema">
        <span class="icon-moon">🌙</span>
        <span class="icon-sun">☀️</span>
    </button>
    
    <div class="container">
      
      <div class="form-container">

        <div class="form-header">
          <p>Preencha seus dados para começar</p>
          <h1>Crie sua conta</h1>
        </div>

        <form class="form-box">
          
          <div class="input-group">
            <input
              type="text"
              id="name"
              class="input-field"
              placeholder=""
              required
            />
            <label for="name" class="floating-label">Nome Completo</label>
          </div>

          <div class="input-group">
            <input
              type="email"
              id="email"
              class="input-field"
              placeholder=""
              required
            />
            <label for="email" class="floating-label">Email</label>
          </div>

          <div class="input-group">
            <input
              type="password"
              id="password"
              class="input-field"
              placeholder=""
              required
            />
            <label for="password" class="floating-label">Senha</label>
            
            <div class="eye-icon" onclick="togglePassword()">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-eye-icon lucide-eye"
              >
                <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </div>
          </div>

          <button type="submit" class="form-btn form-btn--submit">
            Criar Conta
          </button>
        </form>

        <div class="form-divider">
          <p>ou</p>
        </div>

        <div class="form-bottom">
          <button class="form-btn form-btn--google">
            <img src="../assets/icons/google.svg" class="btn-icon" alt="Ícone do Google" />
            Continuar com o Google
          </button>
          
          <p>
            Já possui uma conta? <a href="login.html" class="form-link">Faça Login</a>
          </p>
        </div>

      </div>
    </div>

    <script>
      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.querySelector(".eye-icon");

        // Se o input for do tipo password, muda para text (revelando a senha) e substitui o ícone para o olho cortado (eye-off)
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          eyeIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off-icon lucide-eye-off"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>`;
        } else {
          // Caso contrário, volta a esconder a senha e restaura o ícone original de olho aberto
          passwordInput.type = "password";
          eyeIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>`;
        }
      }
    </script>
</body>
</html>
